name: Project 7 Social Network Analysis (Discord Notification)

on:
  push:
    paths:
      - 'project7/data/**'
  workflow_dispatch:

jobs:
  analyze-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f project7/requirements.txt ]; then pip install -r project7/requirements.txt; fi

      - name: Run SNA Analysis
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          cd project7
          python analysis.py
