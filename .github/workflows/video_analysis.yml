name: Video Analysis and Email Results

on:
  push:
    paths:
      - 'project2/data/*.mp4' # 동영상 파일이 push될 때 실행

jobs:
  analyze-and-email:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project2

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv and dependencies
        run: |
          pip install uv
          uv pip install --system -r requirements.txt

      - name: Run Video Analysis Script
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python video_analysis.py

      - name: Read Analysis Result
        id: read_result
        run: |
          # 분석 결과를 읽어서 환경 변수에 저장 (이메일 본문용)
          RESULT_TEXT=$(cat data/analysis_result.txt)
          echo "ANALYSIS_RESULT<<EOF" >> $GITHUB_ENV
          echo "$RESULT_TEXT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Send Email with Results
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          secure: ${{ secrets.MAIL_SECURE }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: '[자동화 알림] 동영상 분석 결과 보고'
          to: ${{ secrets.MAIL_TO }}
          from: GitHub Video AI Agent
          body: |
            새로운 동영상이 분석되었습니다.
            
            [분석 요약]
            ${{ env.ANALYSIS_RESULT }}
            
            상세 내용은 첨부된 결과 파일에서 확인하실 수 있습니다.
          attachments: project2/data/analysis_result.txt
